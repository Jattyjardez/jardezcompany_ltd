<!DOCTYPE html>
<html>
  <head>
    <title>Jardez site</title>
    <style>
    *{
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

     @media (max-width: 480px){
       body{
         width: 100vw;
         height: 100vh;
       }
       .everything{
         background-color: #8798ac;
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
       }
       .container{
         background-color: white;
         box-sizing: border-box;
         width: 100vw;
         height: 60vh;
         display: flex;
         flex-direction: column;
         border-radius: 10px;
         justify-content: ;
         align-items:  center;
         padding: 10px;
         
       }
       .circle{
         height: 500px;
         width: 200px;
         background-image: url('file1.png');
         background-size: cover;
         border-radius: 50%;
         box-shadow: 0 0 20px rgba(0,9,9,0.3);
       }
       .container h3{
         font-size: 1.1rem;
         text-align: center;
         background-color: white;
         box-shadow: 0 0 10px rgba(0,0,0,0.3);
         width: 100%;
         margin-bottom: 10px;
       }
       .nameCard{
         width: 100%;
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         margin-top: 30px;
       }
      .container h6{
        display: flex;
        height: 150px;
        width: 100%;
        padding-left: 30px;
         display: flex;
         font-family: Sans-Serif;
         font-size: 12px;
         font-weight: bold;
         text-align: center;
       }
       .boxcontainer{
         width: 100%;
       }
       .box{
         width: 100%;
         display: flex;
         margin-top: 10px;
         justify-content:space-evenly;
         
       } 
       #all{
         width: 70px;
         height: 150px;
         cursor: pointer;
         transition: all 0.5s ease-in-out;
     }   
     .box:hover #all{
       filter: grayscale(1) blur(2px);
     }
     .box:hover #all:hover{
       filter: none;
     }
     .box1{
       background-image: url(j3.jpg);
       background-size: cover;
       border-top-right-radius: 30px;
       border-bottom-left-radius: 30px;
     }
     .box2{
       background-image: url(j1.jpg);
       background-size: cover;
       border-top-right-radius: 30px;
       border-bottom-left-radius: 30px;
     }
     .box3{
       background-image: url(j2.jpg);
       background-size: cover;
       border-top-right-radius: 30px;
       border-bottom-left-radius: 30px;
     }
     .navbar{
       justify-content: center;
       align-items: center;
       padding: 10px;
       margin-bottom: 20px;
       display: flex;
       width: 100%;
       background-color: teal;
     }
     .namelogo{
       font-family: Tahoma, Sans-Serif;
       font-size: 24px;
       color: #fff;
     }
    </style>
  </head>
  <body>
    <div class="everything">
      <nav class="navbar">
        <h3 class="namelogo">Jardez Designs</h3>
    </nav>
    
      <div class="container">
        <div class="circle"></div>
        <div class="nameCard">
          <h3>JOEL AKANBASI</h3>
          <h6>A curious ICT student of University <br>    of Education, Winneba <br> who had interest in <br> Programming, System Analysis <br> and Cyber Security</h6>
        </div>
      </div>
    </div>
    
      <div class="boxcontainer">
          <div class="box">
            <div id="all" class="box1"></div>
            <div id="all" class="box2"></div>
            <div id="all" class="box3"></div>
            
          </div>
      </div>
      
  </body>
  
</html>
