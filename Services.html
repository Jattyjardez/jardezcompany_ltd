<!DOCTYPE html>
<html>
  <head>
    <title>Services.com</title>
    <style>
      *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body{
        background-color: teal;
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .cont{
        padding: 40px;
        background-color: rgb(250,250,250);
        border: 1px solid rgb(51,21,10);
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
        border-radius: 30px;
        width: 70vw;
        justify-content: center;
        align-items: center;
      }
      h3{
        color: rgb(223,129,0);
        padding-bottom: 20px;
      }
      p{
        margin-left: 5rem;
        padding-bottom: 10px;
        width: 70vw;
        font-weight: bold;
        justify-content: center;
      }
      h6{
        padding-bottom: 10px;
      }
      @media(max-width: 360px){
        body{
        background-color: teal;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .cont{
        padding: 20px;
        background-color: rgb(250,250,250);
        border: 0.5px solid rgb(51,21,10);
        border-radius: 0 20px;
        width: 300px;
        justify-content: center;
        align-items: center;
      }
      h3{
        color: rgb(223,129,0);
        padding-bottom: 20px;
      }
      p{
        margin-left: 3rem;
        padding-bottom: 10px;
        width: 250px;
        font-weight: bold;
        justify-content: end;
      }
      h6{
        padding-bottom: 5px;
      }
      }
    </style>
  </head>
  <body>
    <div class="cont">
      <h3>Welcome to SarJard<br> Services</h3>
      <p>Dealers in:</p>
      <h6>1. Graphic Designs</h6>
      <h6>2. Web Development</h6>
      <h6>3. Ethical Hacking</h6>
      <h6>4. Men wear</h6>
      <h6>5. Female wear</h6>
    </div>
  </body>
</html>
