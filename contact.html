<!DOCTYPE html>
<html>
  <head>
    <title>Contact</title>
    <style>
      *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body{
        height: 100vh;
        width: 100vw;
        display: flex;
        background-image:linear-gradient(rgba(0,0,0,0.2)), url('s4.jpg');
        background-size: cover;
        justify-content: center;
        align-items: center;
      }
      .contact{
        list-style: none;
        background-color: teal;
        justify-content: center;
        align-items: start;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 10px rgba(25,25,25,0.7);
        border: 1px solid white;
        column-gap: 30px;
      }
        .a{
        color: gold;
        font-family: Times New Roman;
        font-size: 14px;
        padding: 5px 0;
    
      }
      .info{
        font-size: 25px;
        font-weight: bold;
        color: white;
        padding: 0 0 40px 0;
      }
    </style>
  </head>
  <body>
    <ul class="contact">
      <div>
      <li class="info">For more info:</li>
    </div>
      
    <div>
     <li class="a">CEO: Joel Akanbasi</li>
     <li class="a">Phone: +233540430843</li>
     <li class="a">E-mail: akanbasi7@gmail.com</li>
     </div>
  </ul>
  </body>
</html>
